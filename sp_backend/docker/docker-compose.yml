services:
  pgvector-db:
    image: ankane/pgvector:latest
    container_name: pgvector-db
    environment:
      POSTGRES_DB: student_portal
      POSTGRES_USER: student_portal_user
      POSTGRES_PASSWORD: student_portal_password
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgvector_data:
